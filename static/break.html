<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Break Reminder</title>
  <style>
    /* ── Theme variables ── */
    :root {
      --bg-primary: #ffffff;
      --bg-secondary: #f8f9fa;
      --bg-tertiary: #e9ecef;
      --text-primary: #1a1a1a;
      --text-secondary: #6b7280;
      --accent: #6366f1;
      --accent-hover: #4f46e5;
      --warning: #f59e0b;
      --warning-hover: #ea580c;
      --border: #e5e7eb;
      --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }
    [data-theme="dark"] {
      --bg-primary: #1a1a1a;
      --bg-secondary: #2a2a2a;
      --bg-tertiary: #3a3a3a;
      --text-primary: #f5f5f5;
      --text-secondary: #d1d5db;
      --accent: #818cf8;
      --accent-hover: #6366f1;
      --warning: #fbbf24;
      --warning-hover: #fcd34d;
      --border: #374151;
    }
    [data-theme="minecraft"] {
      --bg-primary: #3d2b1f;
      --bg-secondary: #4a3528;
      --bg-tertiary: #5c4333;
      --text-primary: #f5f5f5;
      --text-secondary: #d4d4d4;
      --accent: #3c8527;
      --accent-hover: #4da633;
      --warning: #e19517;
      --warning-hover: #aa7010;
      --border: #2e1f15;
      --font-sans: "Courier New", Courier, monospace;
    }
    [data-theme="retro"] {
      --bg-primary: #0c0c0c;
      --bg-secondary: #1a1a1a;
      --bg-tertiary: #2a2a2a;
      --text-primary: #ffb000;
      --text-secondary: #cc8e00;
      --accent: #ffb000;
      --accent-hover: #ffc233;
      --warning: #ffb000;
      --warning-hover: #ffc233;
      --border: #332200;
      --font-sans: "Consolas", "Monaco", monospace;
    }
    [data-theme="ocean"] {
      --bg-primary: #001219;
      --bg-secondary: #001f2e;
      --bg-tertiary: #005f73;
      --text-primary: #e9d8a6;
      --text-secondary: #94d2bd;
      --accent: #0a9396;
      --accent-hover: #94d2bd;
      --warning: #ee9b00;
      --warning-hover: #ca6702;
      --border: #005f73;
    }
    [data-theme="nord"] {
      --bg-primary: #2e3440;
      --bg-secondary: #3b4252;
      --bg-tertiary: #434c5e;
      --text-primary: #eceff4;
      --text-secondary: #e5e9f0;
      --accent: #88c0d0;
      --accent-hover: #81a1c1;
      --warning: #ebcb8b;
      --warning-hover: #b48ead;
      --border: #4c566a;
    }

    /* ── Reset ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
      font-family: var(--font-sans);
      -webkit-font-smoothing: antialiased;
    }

    /* ── Layout ── */
    .break-window {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      height: 100vh;
      padding: 28px 32px 24px;
      background-color: var(--bg-primary);
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.35), 0 4px 16px rgba(0,0,0,0.2);
      cursor: default;
      user-select: none;
    }

    .break-icon  { font-size: 36px; line-height: 1; margin-bottom: 2px; }

    .break-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--text-primary);
      text-align: center;
      line-height: 1.3;
    }

    .break-message {
      font-size: 13px;
      line-height: 1.55;
      color: var(--text-secondary);
      text-align: center;
      max-width: 320px;
    }

    .break-actions {
      display: flex;
      flex-direction: column;
      gap: 8px;
      width: 100%;
      max-width: 260px;
      margin-top: 4px;
    }

    /* ── Buttons ── */
    .break-btn {
      width: 100%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      padding: 9px 16px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      outline: none;
      transition: transform 150ms ease, box-shadow 150ms ease, background-color 150ms ease;
    }
    .break-btn:hover  { transform: translateY(-1px); box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
    .break-btn:active { transform: translateY(0); }

    .btn-warning   { background-color: var(--warning);    color: #fff; }
    .btn-warning:hover { background-color: var(--warning-hover); }

    .btn-primary   { background-color: var(--accent);     color: #fff; }
    .btn-primary:hover { background-color: var(--accent-hover); }

    .btn-secondary { background-color: var(--bg-secondary); color: var(--text-primary); }
    .btn-secondary:hover { background-color: var(--bg-tertiary); }
  </style>
</head>
<body>
  <div class="break-window" id="drag-region">
    <div class="break-icon">&#9786;</div>
    <h2 class="break-title">Time for a quick break?</h2>
    <p class="break-message" id="break-message">Quick break time. Stand up, stretch, and reset.</p>
    <div class="break-actions" id="break-actions">
      <button type="button" class="break-btn btn-warning"   id="btn-take-break">Take a break</button>
      <button type="button" class="break-btn btn-primary"   id="btn-keep-going">Keep going</button>
      <button type="button" class="break-btn btn-secondary" id="btn-snooze">Remind me in 10 min</button>
    </div>
  </div>

  <script>
    // ── Apply theme ──────────────────────────────────────────────────────────
    const savedTheme = localStorage.getItem("theme") || "light";
    document.documentElement.setAttribute("data-theme", savedTheme);

    // ── Read message from URL query param ────────────────────────────────────
    const params = new URLSearchParams(window.location.search);
    const msg = params.get("message");
    if (msg) {
      document.getElementById("break-message").textContent = msg.replace(/\+/g, " ");
    }

    // ── Tauri API helpers (withGlobalTauri injects window.__TAURI__) ─────────
    async function sendAction(action) {
      try {
        // Tauri v2 global API shape: window.__TAURI__.core.invoke / window.__TAURI__.event.emit
        const tauriCore  = window.__TAURI__?.core  ?? window.__TAURI__;
        const tauriEvent = window.__TAURI__?.event ?? window.__TAURI__;
        await tauriEvent.emit("break:action", { action });
        await tauriCore.invoke("close_break_window");
      } catch (e) {
        console.error("Break action error:", e);
      }
    }

    // ── Button wiring ────────────────────────────────────────────────────────
    document.getElementById("btn-take-break").addEventListener("click", () => sendAction("take_break"));
    document.getElementById("btn-keep-going").addEventListener("click", () => sendAction("dismiss"));
    document.getElementById("btn-snooze").addEventListener("click",     () => sendAction("snooze"));

    // ── Drag region ──────────────────────────────────────────────────────────
    document.getElementById("drag-region").addEventListener("mousedown", (e) => {
      if (e.target.closest("#break-actions")) return;
      try {
        window.__TAURI__?.webviewWindow?.getCurrentWebviewWindow()?.startDragging?.();
      } catch (_) {}
    });
  </script>
</body>
</html>
