name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6


      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'npm'

      # dtolnay/rust-toolchain is a standard way to install Rust in GH Actions
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      # swatinem/rust-cache is the optimal choice for non-Docker Rust builds on GitHub Actions.
      # It automatically caches the ~/.cargo/registry, ~/.cargo/git, and the build target directory.
      # Note: cargo-chef is not used here as it is specifically designed for Docker layer caching.
      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          # Pointing to the Tauri backend directory where Cargo.toml resides
          workspaces: './src-tauri -> target'
          key: ${{ matrix.platform }}-${{ matrix.args }}

      - name: Install frontend dependencies
        run: npm install

      - name: Build the app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASES_REPO_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'MyTodos ${{ github.ref_name }}'
          releaseBody: 'See the assets to download this version and install.'
          releaseDraft: false
          prerelease: false
          owner: SujithChristopher 
          repo: MyTodos-releases
          args: ${{ matrix.args }}
