name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to build for, for example v0.1.42
        required: true
        type: string
      build_windows:
        description: Build Windows release
        required: true
        default: true
        type: boolean
      build_linux:
        description: Build Linux release
        required: true
        default: true
        type: boolean
      build_macos_aarch64:
        description: Build Apple Silicon macOS release
        required: true
        default: true
        type: boolean
      build_macos_x86_64:
        description: Build Intel macOS release
        required: true
        default: true
        type: boolean

jobs:
  release-windows:
    if: ${{ github.event_name == 'push' || github.event.inputs.build_windows == 'true' }}
    permissions:
      contents: write
    runs-on: windows-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'push' && github.ref_name || github.event.inputs.tag }}
      CHECKOUT_REF: ${{ github.event_name == 'push' && github.ref || format('refs/tags/{0}', github.event.inputs.tag) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ env.CHECKOUT_REF }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target
          key: windows-x86_64

      - name: Install frontend dependencies
        run: npm install

      - name: Build the app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
        with:
          tagName: ${{ env.RELEASE_TAG }}
          releaseName: MyTodos ${{ env.RELEASE_TAG }}
          releaseBody: See the assets to download this version and install.
          releaseDraft: false
          prerelease: false
          releaseCommitish: main
          updaterJsonKeepUniversal: true

  release-linux-x86_64:
    if: ${{ github.event_name == 'push' || github.event.inputs.build_linux == 'true' }}
    permissions:
      contents: write
    runs-on: ubuntu-22.04
    env:
      RELEASE_TAG: ${{ github.event_name == 'push' && github.ref_name || github.event.inputs.tag }}
      CHECKOUT_REF: ${{ github.event_name == 'push' && github.ref || format('refs/tags/{0}', github.event.inputs.tag) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ env.CHECKOUT_REF }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target
          key: linux-x86_64

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm install

      - name: Build the app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
        with:
          tagName: ${{ env.RELEASE_TAG }}
          releaseName: MyTodos ${{ env.RELEASE_TAG }}
          releaseBody: See the assets to download this version and install.
          releaseDraft: false
          prerelease: false
          releaseCommitish: main
          updaterJsonKeepUniversal: true

  release-macos-aarch64:
    if: ${{ github.event_name == 'push' || github.event.inputs.build_macos_aarch64 == 'true' }}
    permissions:
      contents: write
    runs-on: macos-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'push' && github.ref_name || github.event.inputs.tag }}
      CHECKOUT_REF: ${{ github.event_name == 'push' && github.ref || format('refs/tags/{0}', github.event.inputs.tag) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ env.CHECKOUT_REF }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target
          key: macos-aarch64

      - name: Install frontend dependencies
        run: npm install

      - name: Build the app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
        with:
          tagName: ${{ env.RELEASE_TAG }}
          releaseName: MyTodos ${{ env.RELEASE_TAG }}
          releaseBody: See the assets to download this version and install.
          releaseDraft: false
          prerelease: false
          releaseCommitish: main
          args: --target aarch64-apple-darwin
          updaterJsonKeepUniversal: true

  release-macos-x86_64:
    if: ${{ github.event_name == 'push' || github.event.inputs.build_macos_x86_64 == 'true' }}
    permissions:
      contents: write
    runs-on: macos-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'push' && github.ref_name || github.event.inputs.tag }}
      CHECKOUT_REF: ${{ github.event_name == 'push' && github.ref || format('refs/tags/{0}', github.event.inputs.tag) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ env.CHECKOUT_REF }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target
          key: macos-x86_64

      - name: Install frontend dependencies
        run: npm install

      - name: Build the app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
        with:
          tagName: ${{ env.RELEASE_TAG }}
          releaseName: MyTodos ${{ env.RELEASE_TAG }}
          releaseBody: See the assets to download this version and install.
          releaseDraft: false
          prerelease: false
          releaseCommitish: main
          args: --target x86_64-apple-darwin
          updaterJsonKeepUniversal: true

  upload-updater-jsons:
    needs: [release-windows, release-linux-x86_64, release-macos-aarch64, release-macos-x86_64]
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      RELEASE_TAG: ${{ github.event_name == 'push' && github.ref_name || github.event.inputs.tag }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Generate and upload platform-specific updater JSONs
        run: |
          set -e
          VERSION="${RELEASE_TAG#v}"
          REPO="PaperPlaneLabs/MyTodos"
          PUB_DATE=$(gh release view "$RELEASE_TAG" --repo "$REPO" --json publishedAt --jq '.publishedAt')

          make_json() {
            local filename="$1" url="$2" sig="$3"
            echo "{}" | jq \
              --arg version "$VERSION" \
              --arg notes "MyTodos $RELEASE_TAG" \
              --arg pub_date "$PUB_DATE" \
              --arg url "$url" \
              --arg sig "$sig" \
              '{version: $version, notes: $notes, pub_date: $pub_date, url: $url, signature: $sig}' > "$filename"
          }

          BASE="https://github.com/$REPO/releases/download/$RELEASE_TAG"

          if sig=$(gh release download "$RELEASE_TAG" --repo "$REPO" --pattern "my-todos_${VERSION}_x64-setup.exe.sig" --output - 2>/dev/null); then
            make_json latest-windows-x86_64.json "$BASE/my-todos_${VERSION}_x64-setup.exe" "$sig"
          fi

          if sig=$(gh release download "$RELEASE_TAG" --repo "$REPO" --pattern "my-todos_aarch64.app.tar.gz.sig" --output - 2>/dev/null); then
            make_json latest-darwin-aarch64.json "$BASE/my-todos_aarch64.app.tar.gz" "$sig"
          fi

          if sig=$(gh release download "$RELEASE_TAG" --repo "$REPO" --pattern "my-todos_x64.app.tar.gz.sig" --output - 2>/dev/null); then
            make_json latest-darwin-x86_64.json "$BASE/my-todos_x64.app.tar.gz" "$sig"
          fi

          if sig=$(gh release download "$RELEASE_TAG" --repo "$REPO" --pattern "my-todos_${VERSION}_amd64.AppImage.tar.gz.sig" --output - 2>/dev/null); then
            make_json latest-linux-x86_64.json "$BASE/my-todos_${VERSION}_amd64.AppImage.tar.gz" "$sig"
          fi

          files=(latest-windows-x86_64.json latest-darwin-aarch64.json latest-darwin-x86_64.json latest-linux-x86_64.json)
          existing=()
          for f in "${files[@]}"; do [[ -f "$f" ]] && existing+=("$f"); done

          if [[ ${#existing[@]} -gt 0 ]]; then
            gh release upload "$RELEASE_TAG" "${existing[@]}" --repo "$REPO" --clobber
          fi

      - name: Create migration release in MyTodos-releases
        if: ${{ needs.release-windows.result == 'success' && hashFiles('latest-windows-x86_64.json') != '' }}
        env:
          GH_TOKEN: ${{ secrets.RELEASES_REPO_TOKEN }}
        run: |
          RELEASES_REPO="SujithChristopher/MyTodos-releases"
          if gh release view "$RELEASE_TAG" --repo "$RELEASES_REPO" &>/dev/null; then
            gh release upload "$RELEASE_TAG" latest-windows-x86_64.json --repo "$RELEASES_REPO" --clobber
          else
            gh release create "$RELEASE_TAG" latest-windows-x86_64.json \
              --repo "$RELEASES_REPO" \
              --title "MyTodos $RELEASE_TAG" \
              --notes "MyTodos $RELEASE_TAG" \
              --latest
          fi
