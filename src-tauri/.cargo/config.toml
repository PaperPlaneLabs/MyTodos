# Cargo configuration for faster builds

[target.x86_64-pc-windows-msvc]
# Use LLVM's lld linker for much faster linking on Windows (30-50% faster)
linker = "rust-lld.exe"

[target.x86_64-pc-windows-gnu]
linker = "rust-lld.exe"

[target.x86_64-unknown-linux-gnu]
# Use lld on Linux for faster linking
rustflags = ["-C", "link-arg=-fuse-ld=lld"]

# macOS uses ld64 which is already optimized, so we don't change it
# Uncommenting these may cause issues on some macOS versions
# [target.aarch64-apple-darwin]
# rustflags = ["-C", "link-arg=-fuse-ld=lld"]
#
# [target.x86_64-apple-darwin]
# rustflags = ["-C", "link-arg=-fuse-ld=lld"]
